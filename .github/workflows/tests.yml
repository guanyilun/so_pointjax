name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run erfa tests
        run: python -m pytest so_pointjax/erfa/tests/ -v --tb=short

      - name: Run qpoint tests
        run: python -m pytest so_pointjax/qpoint/tests/ -v --tb=short

      - name: Run proj tests
        run: python -m pytest so_pointjax/proj/tests/test_quat.py so_pointjax/proj/tests/test_coords.py -v --tb=short

  cross-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[crossval]"

      - name: Run erfa cross-validation
        run: python -m pytest so_pointjax/erfa/tests/test_validation.py -v --tb=short

      - name: Run qpoint cross-validation
        run: python -m pytest so_pointjax/qpoint/tests/test_validation.py -v --tb=short

      - name: Run so3g cross-validation
        run: python -m pytest so_pointjax/proj/tests/test_cross_validation.py -v --tb=short
